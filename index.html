<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lull Match Legal</title>
  <style>
    :root {
      --bg: #faf7f3;
      --card: #ffffff;
      --text: #2f2a26;
      --muted: #6e6258;
      --line: #e8ddd2;
      --accent: #8f6f5a;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap { max-width: 800px; margin: 0 auto; padding: 40px 20px 64px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    h1 { color: var(--accent); margin-top: 0; }
    .links a {
      display: block;
      margin: 14px 0;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      background: #fffdfa;
    }
    .links a:hover { border-color: var(--accent); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Lull Match Legal</h1>
      <p class="muted">Developer / Publisher: SAIOTIX</p>
      <div class="links">
        <a href="./privacy.html"><strong>Privacy Policy</strong><br><span class="muted">Data collection, analytics, crash reporting, and rewarded ads</span></a>
        <a href="./terms.html"><strong>Terms of Service</strong><br><span class="muted">Rules for using the app and core legal terms</span></a>
      </div>
      <p class="muted">Contact: rladkffprtm0930@gmail.com</p>
    </div>
  </div>
</body>
</html>
